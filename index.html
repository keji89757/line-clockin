<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明順電氣打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(180deg, #fff8dc 0%, #f5f7fb 35%, #eef2f7 100%);
      color: #222;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 32px;
    }

    .app-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 22px 18px;
      margin-top: 14px;
    }

    .title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 700;
      margin: 8px 0 6px;
      text-align: center;
    }

    .lightning {
      color: #FFD700;
      font-size: 30px;
      line-height: 1;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .info-box {
      background: #f7f9fc;
      border: 1px solid #e8edf5;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .info-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .info-text {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 18px 16px;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-checkin {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .btn-checkout {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .status-card {
      margin-top: 18px;
      background: #111827;
      color: #f9fafb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(17,24,39,0.18);
    }

    .status-title {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .status-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app-card">
      <div class="title">
        <span class="lightning">⚡</span>
        <span>明順電氣打卡系統</span>
      </div>
      <div class="subtitle">請確認定位已開啟，再進行上下班打卡</div>

      <div class="info-box">
        <div class="info-title">目前使用者</div>
        <div id="userInfo" class="info-text">LIFF 初始化中...</div>
      </div>

      <div class="btn-group">
        <button id="checkInBtn" class="btn btn-checkin" disabled>上班打卡</button>
        <button id="checkOutBtn" class="btn btn-checkout" disabled>下班打卡</button>
      </div>

      <div class="status-card">
        <div class="status-title">系統訊息</div>
        <div id="status" class="status-text">LIFF 初始化中...</div>
      </div>

      <div class="footer-note">
        若定位異常，請移動到訊號較好的位置再試一次
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwffhf5ZXzgtPZoPJuSTAOBHngYT4Ue7M-gVdaViMnLktdgsF2boaXI97469QYAS41L/exec";
    const LIFF_ID = "2009546112-CA100Nfj";

    let currentUserId = "";

    async function initApp() {
      const statusEl = document.getElementById("status");
      const userInfoEl = document.getElementById("userInfo");

      try {
        statusEl.innerText = "正在初始化 LINE LIFF...";
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          statusEl.innerText = "尚未登入 LINE，準備跳轉登入...";
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId;

        userInfoEl.innerText =
          "User ID：\n" + currentUserId;

        statusEl.innerText =
          "✅ 初始化成功\n請選擇上班或下班打卡";

        document.getElementById("checkInBtn").disabled = false;
        document.getElementById("checkOutBtn").disabled = false;

      } catch (err) {
        userInfoEl.innerText = "讀取失敗";
        statusEl.innerText = "❌ LIFF 初始化失敗\n" + err;
      }
    }

    function sendAttendance(type) {
      const statusEl = document.getElementById("status");

      if (!navigator.geolocation) {
        statusEl.innerText = "❌ 此裝置不支援 GPS";
        return;
      }

      if (!currentUserId) {
        statusEl.innerText = "❌ 缺少必要參數：LINE User ID";
        return;
      }

      statusEl.innerText = "📡 正在取得 GPS 定位...";

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          const params = new URLSearchParams({
            userId: currentUserId,
            type: type,
            latitude: lat,
            longitude: lng,
            accuracy: accuracy
          });

          const url = GAS_URL + "?" + params.toString();

          statusEl.innerText =
            "📤 正在送出打卡...\n" +
            "類型：" + type + "\n" +
            "定位精度：" + accuracy.toFixed(0) + " m";

          try {
            const response = await fetch(url, {
              method: "GET",
              redirect: "follow"
            });

            const text = (await response.text()).trim();

            if (text === "OK") {
              statusEl.innerText =
                "✅ 打卡成功\n" +
                "類型：" + type + "\n" +
                "定位精度：" + accuracy.toFixed(0) + " m";
            } else if (text === "重複打卡") {
              statusEl.innerText =
                "⚠️ 重複打卡\n" +
                "今天已經打過「" + type + "」卡";
            } else if (text === "缺少必要參數") {
              statusEl.innerText =
                "❌ 缺少必要參數\n" +
                "請聯絡管理員確認系統設定";
            } else {
              statusEl.innerText =
                "❌ 打卡失敗\n" + text;
            }
          } catch (err) {
            statusEl.innerText =
              "❌ 打卡失敗\n無法讀取伺服器回應：" + err;
          }
        },
        function(err) {
          statusEl.innerText = "❌ GPS 取得失敗\n" + err.message;
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    document.getElementById("checkInBtn").addEventListener("click", function() {
      sendAttendance("上班");
    });

    document.getElementById("checkOutBtn").addEventListener("click", function() {
      sendAttendance("下班");
    });

    initApp();
  </script>
</body>
</html>
