<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LINE 打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>LINE 打卡系統</h1>
  <button id="checkInBtn" disabled>上班打卡</button>
  <button id="checkOutBtn" disabled>下班打卡</button>
  <pre id="status">LIFF 初始化中...</pre>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwffhf5ZXzgtPZoPJuSTAOBHngYT4Ue7M-gVdaViMnLktdgsF2boaXI97469QYAS41L/exec";
    const LIFF_ID = "2009546112-CA100Nfj";
    let currentUserId = "";

    async function initApp() {
      const statusEl = document.getElementById("status");

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          statusEl.innerText = "尚未登入 LINE，準備跳轉登入...";
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId;

        statusEl.innerText =
          "LIFF 初始化成功\n" +
          "LINE User ID: " + currentUserId;

        document.getElementById("checkInBtn").disabled = false;
        document.getElementById("checkOutBtn").disabled = false;

      } catch (err) {
        statusEl.innerText = "LIFF 初始化失敗：\n" + err;
      }
    }

    function sendAttendance(type) {
      const statusEl = document.getElementById("status");

      if (!navigator.geolocation) {
        statusEl.innerText = "此裝置不支援 GPS";
        return;
      }

      if (!currentUserId) {
        statusEl.innerText = "缺少必要參數：LINE User ID";
        return;
      }

      statusEl.innerText = "正在取得定位...";

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          const params = new URLSearchParams({
            userId: currentUserId,
            type: type,
            latitude: lat,
            longitude: lng,
            accuracy: accuracy
          });

          const url = GAS_URL + "?" + params.toString();

          statusEl.innerText =
            "正在送出打卡...\n" +
            "User ID: " + currentUserId + "\n" +
            "類型: " + type + "\n" +
            "GPS: " + lat + ", " + lng;

          try {
            const response = await fetch(url, {
              method: "GET",
              redirect: "follow"
            });

            const text = (await response.text()).trim();

            if (text === "OK") {
              statusEl.innerText =
                "✅ 打卡成功\n" +
                "類型：" + type + "\n" +
                "已記錄您的位置與時間";
            } else if (text === "重複打卡") {
              statusEl.innerText =
                "⚠️ 重複打卡\n" +
                "今天已經打過「" + type + "」卡";
            } else if (text === "缺少必要參數") {
              statusEl.innerText =
                "❌ 缺少必要參數\n" +
                "請聯絡管理員確認系統設定";
            } else {
              statusEl.innerText =
                "❌ 打卡失敗\n" +
                text;
            }
          } catch (err) {
            statusEl.innerText =
              "❌ 打卡失敗\n" +
              "無法讀取伺服器回應：" + err;
          }
        },
        function(err) {
          statusEl.innerText = "GPS 取得失敗：" + err.message;
        }
      );
    }

    document.getElementById("checkInBtn").addEventListener("click", function() {
      sendAttendance("上班");
    });

    document.getElementById("checkOutBtn").addEventListener("click", function() {
      sendAttendance("下班");
    });

    initApp();
  </script>
</body>
</html>
